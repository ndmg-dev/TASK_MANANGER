version: "3.9"

services:
  # ─── BACKEND (Flask + Gunicorn) ───────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ndmg-backend-prod
    # O Coolify vai gerenciar na aba "Environment Variables" dele.
    # Repassamos as variáveis automaticamente:
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME}
      - GITHUB_BASE_BRANCH=${GITHUB_BASE_BRANCH}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Variáveis nativas injetadas do Coolify (para sumir o erro de validação):
      - SERVICE_FQDN_FRONTEND=${SERVICE_FQDN_FRONTEND}
      - SERVICE_URL_FRONTEND=${SERVICE_URL_FRONTEND}
    restart: unless-stopped

  # ─── FRONTEND (React + Vite + Nginx) ──────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Repassa as vars do Docker-Compose (geradas no painel do Coolify)
        # Para dentro do ambiente de build do React
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        VITE_API_URL: /api
    container_name: ndmg-frontend-prod
    depends_on:
      - backend
    restart: unless-stopped
